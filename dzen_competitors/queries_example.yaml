# Шаблоны расширения ниши в поисковые запросы.
# {niche} подставляется из --niche. Пустой модификатор = сам запрос ниши.
modifiers:
  - ""
  - "как ухаживать"
  - "ошибки"
  - "для начинающих"
  - "советы"
  - "пошагово"
  - "в домашних условиях"
  - "гайд"
  - "чек-лист"
  - "обзор"
  - "сравнение"
  - "плюсы и минусы"
  - "лучшие"
  - "рейтинг"
  - "2026"

# Дополнительные свободные запросы (не шаблоны, подставляются как есть).
extra: []
